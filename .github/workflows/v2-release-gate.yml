name: V2 Release Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/v2-release-gate.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/v2-release-gate.yml"
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: true
      TMPDIR: ${{ github.workspace }}/.tmp/jest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Prepare temp directories
        run: mkdir -p .tmp/jest logs output/v2-benchmarks

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Prepare database
        run: |
          npx --prefix backend prisma generate --schema backend/prisma/schema.prisma
          npx --prefix backend prisma db push --schema backend/prisma/schema.prisma
          npm --prefix backend run seed

      - name: Run V2 release gate
        run: npm run check:v2:release-candidate

      - name: Upload benchmark and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-release-gate-artifacts
          path: |
            logs/
            output/v2-benchmarks/
          if-no-files-found: ignore
