services:
  soccer-director-v2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE: ""
        REACT_APP_V2_ENABLED: "true"
    image: soccer-director-v2:latest
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: http://localhost:4000
      PERSIST_DIR: /persist
    volumes:
      - ./deploy/data:/persist
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
