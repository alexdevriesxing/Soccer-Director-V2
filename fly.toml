app = "soccer-director-v2"
primary_region = "ams"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    REACT_APP_API_BASE = ""
    REACT_APP_V2_ENABLED = "true"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  PERSIST_DIR = "/persist"

[[mounts]]
  source = "soccer_director_data"
  destination = "/persist"
  initial_size = "5gb"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1gb"
  auto_extend_size_limit = "20gb"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
